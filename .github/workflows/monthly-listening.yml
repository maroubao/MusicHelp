name: monthly-listening

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      config_path:
        description: Config file path
        required: false
        default: config/listening-task.yaml
      debug_label:
        description: Optional label to include in the run summary
        required: false
        default: manual-run

concurrency:
  group: monthly-listening
  cancel-in-progress: false

jobs:
  run-listening-task:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      MUSICHELP_CONFIG_PATH: ${{ inputs.config_path || 'config/listening-task.yaml' }}
      MUSICHELP_TARGET_EFFECTIVE_COUNT: ${{ vars.MUSICHELP_TARGET_EFFECTIVE_COUNT }}
      MUSICHELP_TARGET_SONG_URL: ${{ vars.MUSICHELP_TARGET_SONG_URL }}
      MUSICHELP_TARGET_SONG_NAME: ${{ vars.MUSICHELP_TARGET_SONG_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore persisted session cache
        id: session-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            artifacts/state/session-state.json
            artifacts/state/session-metadata.json
          key: monthly-listening-session-${{ github.ref_name }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate config
        run: npm run check-config -- "${MUSICHELP_CONFIG_PATH}"

      - name: Run tests
        run: npm test

      - name: Run monthly task
        env:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          QR_LINK_PUBLIC_BASE_URL: ${{ vars.QR_LINK_PUBLIC_BASE_URL }}
          QR_LINK_SIGNING_SECRET: ${{ secrets.QR_LINK_SIGNING_SECRET }}
          NETEASE_SESSION_SECRET: ${{ secrets.NETEASE_SESSION_SECRET }}
          NETEASE_USERNAME: ${{ secrets.NETEASE_USERNAME }}
          NETEASE_PASSWORD: ${{ secrets.NETEASE_PASSWORD }}
        run: npm run task:monthly

      - name: Append GitHub summary
        if: always()
        shell: bash
        run: |
          echo "# monthly-listening" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- config_path: ${MUSICHELP_CONFIG_PATH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- debug_label: ${{ inputs.debug_label || 'schedule-run' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/reports/run-summary.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/reports/run-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Save persisted session cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            artifacts/state/session-state.json
            artifacts/state/session-metadata.json
          key: monthly-listening-session-${{ github.ref_name }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-listening-artifacts
          path: artifacts/
